<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    background: #f5f4f0;
    color: #1a1a1a;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 640px;
    height: 100dvh;
    max-height: 780px;
    display: flex;
    flex-direction: column;
    background: #fafaf8;
    border: 1px solid #ddddd8;
  }

  .header {
    padding: 16px 24px;
    border-bottom: 1px solid #e8e8e4;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-name {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #999;
    font-weight: 300;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: #d0d0cc; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: appear 0.2s ease;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-items: flex-end; }
  .msg.bot  { align-items: flex-start; }

  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .bubble {
    max-width: 82%;
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user { background: #1a1a1a; color: #f5f4f0; }
  .bubble.bot  { background: #eeede8; color: #1a1a1a; }

  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 15px;
    background: #eeede8;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #999;
    animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  .empty {
    color: #ccc;
    font-size: 13px;
    text-align: center;
    margin: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
  }

  .input-area {
    border-top: 1px solid #e8e8e4;
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: #fafaf8;
  }

  textarea {
    flex: 1;
    border: 1px solid #ddddd8;
    background: #f5f4f0;
    padding: 10px 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: #1a1a1a;
    resize: none;
    outline: none;
    min-height: 40px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: #aaa; }
  textarea::placeholder { color: #bbb; }

  button {
    height: 40px;
    padding: 0 16px;
    background: #1a1a1a;
    color: #f5f4f0;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  button:hover    { opacity: 0.7; }
  button:disabled { opacity: 0.2; cursor: not-allowed; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="header-name">Assistant</span>
    <span class="header-status">online</span>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="empty">say something</div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Type a message…" rows="1"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const history    = [];

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function addMessage(role, text) {
    document.getElementById('empty')?.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `<div class="label">${role === 'user' ? 'you' : 'ai'}</div><div class="bubble ${role}">${text}</div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot'; wrap.id = 'typing';
    wrap.innerHTML = `<div class="label">ai</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    addTyping();

    try {
      const res  = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a helpful assistant. Be concise and clear.',
          messages: history
        })
      });
      const data  = await res.json();
      const reply = data?.content?.[0]?.text || 'No response.';
      document.getElementById('typing')?.remove();
      addMessage('bot', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      document.getElementById('typing')?.remove();
      addMessage('bot', 'Something went wrong. Please try again.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
