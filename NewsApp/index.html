<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Morning Read</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="site-header">
    <div class="header-top">
      <span class="date-line" id="dateLine"></span>
      <span class="tagline">Your quiet corner of the internet</span>
    </div>
    <div class="masthead">
      <h1 class="logo">The Morning Read</h1>
      <p class="sub-logo">Honest stories. Human voices.</p>
    </div>
    <nav class="category-nav">
      <button class="cat-btn active" data-category="general">Everything</button>
      <button class="cat-btn" data-category="technology">Technology</button>
      <button class="cat-btn" data-category="science">Science</button>
      <button class="cat-btn" data-category="health">Health</button>
      <button class="cat-btn" data-category="business">Business</button>
      <button class="cat-btn" data-category="entertainment">Culture</button>
      <button class="cat-btn" data-category="sports">Sports</button>
    </nav>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search for stories…" />
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <main class="main-content">
    <section class="featured-section" id="featuredSection">
      <div class="featured-card" id="featuredCard">
      </div>
    </section>

    <div class="section-divider">
      <span>More Stories</span>
    </div>

    <section class="news-grid" id="newsGrid">
    </section>

    
    <div class="load-more-wrap">
      <button class="load-more-btn" id="loadMoreBtn">Load more stories</button>
    </div>
  </main>

  
  <footer class="site-footer">
    <p>Made with curiosity &amp; care &nbsp;·&nbsp; Powered by <a href="https://newsapi.org" target="_blank">NewsAPI</a></p>
    <p class="footer-note">Reading is an act of resistance against the noise.</p>
  </footer>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" id="modalCard">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-inner" id="modalInner"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
