<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luminary — Theme Toggle</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Star field (dark mode) -->
  <canvas id="stars"></canvas>

  <!-- Main card -->
  <main class="card" id="card">
    <div class="card-inner">

      <header class="card-header">
        <div class="logo" id="logo">
          <svg class="logo-sun" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="9" stroke="currentColor" stroke-width="1.5"/>
            <line x1="20" y1="2" x2="20" y2="7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="20" y1="33" x2="20" y2="38" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="20" x2="7" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="33" y1="20" x2="38" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6.1" y1="6.1" x2="9.8" y2="9.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="30.2" y1="30.2" x2="33.9" y2="33.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="33.9" y1="6.1" x2="30.2" y2="9.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="9.8" y1="30.2" x2="6.1" y2="33.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <svg class="logo-moon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M28 20.5C28 26.299 23.299 31 17.5 31C14.077 31 11.04 29.369 9.1 26.87C10.113 27.119 11.175 27.25 12.268 27.25C18.895 27.25 24.268 21.877 24.268 15.25C24.268 12.617 23.417 10.18 21.96 8.2C25.497 9.933 28 13.44 28 17.5V20.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="wordmark" id="wordmark">Luminary</span>
      </header>

      <div class="toggle-section">
        <span class="toggle-label label-left" id="label-light">Light</span>

        <button class="toggle-track" id="toggle" role="switch" aria-checked="false" aria-label="Toggle dark mode">
          <div class="toggle-thumb" id="thumb">
            <div class="thumb-face">
              <!-- Sun rays on thumb -->
              <svg class="thumb-sun" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.2"/>
                <line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="4.9" y1="4.9" x2="7" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="17" y1="17" x2="19.1" y2="19.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="19.1" y1="4.9" x2="17" y2="7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                <line x1="7" y1="17" x2="4.9" y2="19.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
              <!-- Moon on thumb -->
              <svg class="thumb-moon" viewBox="0 0 24 24" fill="none">
                <path d="M17 12.3C17 15.78 14.09 18.6 10.5 18.6C8.45 18.6 6.62 17.62 5.46 16.12C6.07 16.27 6.7 16.35 7.36 16.35C11.34 16.35 14.56 13.13 14.56 9.15C14.56 7.57 14.05 6.11 13.18 4.92C15.1 5.96 17 8.88 17 10.5V12.3Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
              </svg>
            </div>
          </div>
          <div class="track-glow" id="track-glow"></div>
        </button>

        <span class="toggle-label label-right" id="label-dark">Dark</span>
      </div>

      <div class="status-pill" id="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Night Mode Active</span>
      </div>

      <div class="divider" id="divider"></div>

      <div class="info-grid" id="info-grid">
        <div class="info-card" id="info-0">
          <div class="info-icon">◈</div>
          <div class="info-body">
            <div class="info-label">Theme</div>
            <div class="info-value" id="theme-value">Dark</div>
          </div>
        </div>
        <div class="info-card" id="info-1">
          <div class="info-icon">◉</div>
          <div class="info-body">
            <div class="info-label">Preference</div>
            <div class="info-value">Saved</div>
          </div>
        </div>
        <div class="info-card" id="info-2">
          <div class="info-icon">◌</div>
          <div class="info-body">
            <div class="info-label">Version</div>
            <div class="info-value">2.0</div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer" id="footer">
    <span>Built with GSAP · Persists across sessions</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
